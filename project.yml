name: SandboxApp
options:
  bundleIdPrefix: com.local
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  developmentLanguage: en
  knownRegions:
    - en
    - es
    - de

configFiles:
  Debug: Config.Debug.xcconfig
  Release: Config.Release.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
    SWIFT_PACKAGE_REGISTRY_USE_PRECOMPILED_MODULES: NO

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  SandboxApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.SandboxApp
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: GoogleSignIn
